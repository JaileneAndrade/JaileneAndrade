name: Generate Blinky (Pacman)

on:
  schedule: # Se ejecuta automáticamente todos los días
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite ejecutarlo manualmente
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Generate Pacman animation
        uses: Jupyter-Blinky/Jupyter-Blinky@v1
        with:
          github_user_name: JaileneAndrade
          
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output # Guardará la imagen en la rama 'output'
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
